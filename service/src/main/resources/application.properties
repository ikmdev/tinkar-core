spring.application.name=tinkar-service
server.port=8085
grpc.server.port=9095

# SpringDoc OpenAPI / Swagger UI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Tinkar data path
data.path.parent=data
# data.path.child=solor-us-tinkar.sa
#data.path.child=rockskb
data.path.child=gudid
#data.path.child=new

# Tinkar data controller selection
# Options: "Open SpinedArrayStore" or "Open Rocks KB"
# Default: "Open SpinedArrayStore"
data.controller.name=Open Rocks KB

# File upload limits for changeset import
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# gRPC max message size (for large import/export payloads)
grpc.server.max-inbound-message-size=536870912

# Logging
logging.level.dev.ikm.tinkar=DEBUG
logging.level.ai.ica.tinkar=DEBUG